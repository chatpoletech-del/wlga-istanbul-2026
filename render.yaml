# Render Blueprint — WLGA Istanbul 2026 Frontend (Static Site)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: wlga-istanbul-2026
    runtime: static
    # If your repo root is "istanbul" and frontend lives in wlga-poc/frontend:
    rootDir: wlga-poc/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA: serve index.html for all routes
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
